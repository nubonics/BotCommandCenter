{% extends "base.html" %}
{% block content %}

<div class="page-header">
    <div>
        <h2>{% if plan %}Edit Plan{% else %}New Plan{% endif %}</h2>
        <p>Create the plan shell, then add steps on the detail page.</p>
    </div>
</div>

<div class="card" style="max-width:700px;">
    <form action="{% if plan %}/planner_core/plans/{{ plan.id }}/edit{% else %}/planner_core/plans/new{% endif %}" method="post">
        <div class="form-grid">
            <div class="form-group form-group-full"><label>Plan Name</label><input type="text" name="name" value="{{ plan.name if plan else '' }}" placeholder="e.g. Daily Fletching Rotation" required></div>
            <div class="form-group"><label>Target Active Minutes</label><input type="number" name="target_active_minutes" min="0" value="{{ plan.target_active_minutes if plan and plan.target_active_minutes else 0 }}"></div>
            <div class="form-group form-group-full"><label>Description</label><textarea name="description" rows="3">{{ plan.description if plan and plan.description else '' }}</textarea></div>
        </div>
        <div class="actions" style="margin-top:20px;">
            <a href="/planner_core/plans"><button type="button" class="secondary">Cancel</button></a>
            <button type="submit">{% if plan %}Save{% else %}Create{% endif %}</button>
        </div>
    </form>
</div>

{% endblock %}
