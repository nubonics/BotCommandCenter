<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Command Center</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #06061a;
            --card: #0e1030;
            --card-2: #13163f;
            --border: rgba(255,255,255,0.10);
            --text: #f5f7ff;
            --muted: #aab2d5;
            --accent: #7c8cff;
            --accent-2: #9f6bff;
            --good: #58d68d;
            --bad: #ff6b81;
            --warn: #ffd166;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, Segoe UI, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(124, 140, 255, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(159, 107, 255, 0.12), transparent 22%),
                var(--bg);
            color: var(--text);
        }

        a { color: #c7d0ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .layout {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Watching wall: maximize usable area while keeping top nav. */
        body.wall-max .layout {
            max-width: none;
            padding: 10px 10px;
        }

        body.wall-max .topbar {
            margin-bottom: 10px;
            padding: 10px 12px;
            border-radius: 14px;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .hwbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-end;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .pill {
            display: inline-flex;
            gap: 6px;
            align-items: center;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            white-space: nowrap;
        }

        .pill strong {
            color: var(--text);
            font-weight: 800;
        }

        .pill.bad strong { color: var(--bad); }
        .pill.warn strong { color: var(--warn); }

        .nav a {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            text-decoration: none;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.06);
        }

        .message {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(88, 214, 141, 0.25);
            background: rgba(88, 214, 141, 0.10);
            color: #d9ffe8;
        }

        .page-header {
            display: flex;
            gap: 16px;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .page-header h2 {
            margin: 0 0 6px 0;
            font-size: 1.8rem;
        }

        .page-header p {
            margin: 0;
            color: var(--muted);
        }

        .card {
            background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .stat-card h3 {
            margin-top: 0;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .big-number {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .positive { color: var(--good); }
        .negative { color: var(--bad); }

        form { margin: 0; }

        .inline-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-row,
        .form-group {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .form-group-full,
        .form-group-lg {
            grid-column: span 2;
        }

        label {
            font-weight: 700;
            font-size: 0.95rem;
        }

        input,
        textarea,
        select,
        button {
            font: inherit;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: rgba(124, 140, 255, 0.65);
            box-shadow: 0 0 0 3px rgba(124, 140, 255, 0.16);
        }

        button {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            cursor: pointer;
            font-weight: 700;
        }

        button:hover { opacity: 0.95; }

        button.danger {
            background: linear-gradient(135deg, #d94f70, #ff6b81);
        }

        button.secondary,
        .secondary-link {
            background: rgba(255,255,255,0.03);
            color: var(--text);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .mono {
            font-family: Consolas, Monaco, monospace;
        }

        .secret-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .secret {
            display: none;
            padding: 6px 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .secret.revealed {
            display: inline-block;
        }

        .tiny-btn {
            padding: 8px 10px;
            font-size: 0.85rem;
            line-height: 1;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .muted { color: var(--muted); }

        dl {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 12px 14px;
            margin: 0;
        }

        dt {
            color: var(--muted);
            font-weight: 700;
        }

        dd {
            margin: 0;
            word-break: break-word;
        }

        @media (max-width: 900px) {
            .grid-2, .grid-3, .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group-full,
            .form-group-lg {
                grid-column: span 1;
            }

            dl {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="layout">
        <div class="topbar">
            <div class="brand">
                <h1>Bot Command Center</h1>
                <p>Items, methods, and account tracking</p>
            </div>
            <div class="topbar-right">
                <nav class="nav">
                    <a href="/">Money Makers</a>
                    <a href="/planner_core/plans">Planner</a>
                    <a href="/items">Items</a>
                    <a href="/accounts">Accounts</a>
                    <a href="/client-wall">Client Wall</a>
                    <a href="/window-spreader">Window Spreader</a>
                    <a href="/watchdog">Watchdog</a>
                </nav>

                <div class="hwbar" id="hwbar" aria-label="Hardware usage">
                    <span class="pill"><span>CPU</span> <strong id="hwCpu">-</strong></span>
                    <span class="pill"><span>RAM</span> <strong id="hwRam">-</strong></span>
                    <span class="pill"><span>Commit</span> <strong id="hwCommit">-</strong></span>
                    <span class="pill"><span>Disk Full</span> <strong id="hwDiskFull">-</strong></span>
                    <span class="pill"><span>Disk Busy</span> <strong id="hwDiskBusy">-</strong></span>
                    <span class="pill" id="hwGpuPill" style="display:none;"><span>GPU</span> <strong id="hwGpu">-</strong></span>
                    <span class="pill" id="hwGpuMemPill" style="display:none;"><span>VRAM</span> <strong id="hwGpuMem">-</strong></span>
                </div>

                <div class="hwbar" id="updatebar" aria-label="Updates" style="margin-left: 12px;">
                    <span class="pill" id="updatePill" style="display:none;"><span>Update</span> <strong id="updateText">-</strong></span>
                    <button type="button" class="secondary tiny-btn" id="updateBtn" style="display:none;" onclick="runUpdatePull()">Update</button>
                </div>
            </div>
        </div>

        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script>
    function toggleSecret(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle("revealed");
    }

    function classifyPill(pillEl, pct) {
        pillEl.classList.remove('warn', 'bad');
        if (pct >= 95) pillEl.classList.add('bad');
        else if (pct >= 85) pillEl.classList.add('warn');
    }

    async function refreshHwbar() {
        try {
            const resp = await fetch('/api/health/hw', { cache: 'no-store' });
            if (!resp.ok) return;
            const data = await resp.json();

            const cpu = Number(data.cpu_percent ?? 0);
            const ram = Number(data.ram_percent ?? 0);
            const commit = data.commit_percent;
            const diskFull = Number(data.disk_full_percent ?? 0);
            const diskBusy = data.disk_busy_percent;

            const cpuEl = document.getElementById('hwCpu');
            const ramEl = document.getElementById('hwRam');
            const commitEl = document.getElementById('hwCommit');
            const diskFullEl = document.getElementById('hwDiskFull');
            const diskBusyEl = document.getElementById('hwDiskBusy');

            cpuEl.textContent = `${cpu.toFixed(0)}%`;
            ramEl.textContent = `${ram.toFixed(0)}%`;
            if (commit === null || commit === undefined) {
                commitEl.textContent = `?`;
                commitEl.parentElement.classList.remove('warn', 'bad');
            } else {
                commitEl.textContent = `${Number(commit).toFixed(0)}%`;
                classifyPill(commitEl.parentElement, Number(commit));
                const used = data.commit_used_gb;
                const limit = data.commit_limit_gb;
                if (used !== null && used !== undefined && limit !== null && limit !== undefined) {
                    commitEl.parentElement.title = `Commit ${used} / ${limit} GB`;
                }
            }
            diskFullEl.textContent = `${diskFull.toFixed(0)}%`;
            if (diskBusy === null || diskBusy === undefined) {
                diskBusyEl.textContent = `?`;
            } else {
                diskBusyEl.textContent = `${Number(diskBusy).toFixed(0)}%`;
            }

            classifyPill(cpuEl.parentElement, cpu);
            classifyPill(ramEl.parentElement, ram);
            classifyPill(diskFullEl.parentElement, diskFull);
            if (diskBusy !== null && diskBusy !== undefined) {
                classifyPill(diskBusyEl.parentElement, Number(diskBusy));
            } else {
                diskBusyEl.parentElement.classList.remove('warn', 'bad');
            }

            const gpu = data.gpu;
            const gpuPill = document.getElementById('hwGpuPill');
            const gpuEl = document.getElementById('hwGpu');
            const gpuMemPill = document.getElementById('hwGpuMemPill');
            const gpuMemEl = document.getElementById('hwGpuMem');
            if (gpu && gpuPill && gpuEl) {
                gpuPill.style.display = '';
                const util = Number(gpu.util_percent ?? 0);
                gpuEl.textContent = `${util.toFixed(0)}%`;
                classifyPill(gpuPill, util);
                gpuPill.title = `${gpu.name || 'GPU'} | mem ${gpu.mem_percent ?? '?'}% | ${gpu.temp_c ?? '?'}C`;

                if (gpuMemPill && gpuMemEl) {
                    const mp = gpu.mem_percent;
                    if (mp === null || mp === undefined) {
                        gpuMemPill.style.display = 'none';
                    } else {
                        gpuMemPill.style.display = '';
                        gpuMemEl.textContent = `${Number(mp).toFixed(0)}%`;
                        classifyPill(gpuMemPill, Number(mp));
                        gpuMemPill.title = `${gpu.mem_used_mb ?? '?'} / ${gpu.mem_total_mb ?? '?'} MB`;
                    }
                }
            } else if (gpuPill) {
                gpuPill.style.display = 'none';
                if (gpuMemPill) gpuMemPill.style.display = 'none';
            }
        } catch (e) {
            // ignore
        }
    }

    refreshHwbar();
    setInterval(refreshHwbar, 2000);
    </script>

    <script>
    async function checkUpdateStatus() {
        try {
            const resp = await fetch('/api/update/status', { cache: 'no-store' });
            const data = await resp.json();
            const pill = document.getElementById('updatePill');
            const btn = document.getElementById('updateBtn');
            const txt = document.getElementById('updateText');
            if (!pill || !btn || !txt) return;

            if (!resp.ok || !data.ok) {
                pill.style.display = 'none';
                btn.style.display = 'none';
                return;
            }

            const behind = data.behind;
            if (typeof behind === 'number' && behind > 0) {
                pill.style.display = '';
                btn.style.display = '';
                txt.textContent = `${behind} behind`;
            } else {
                pill.style.display = 'none';
                btn.style.display = 'none';
            }
        } catch (e) {
            // ignore
        }
    }

    async function runUpdatePull() {
        const btn = document.getElementById('updateBtn');
        if (btn) btn.disabled = true;
        try {
            const resp = await fetch('/api/update/pull', { method: 'POST', cache: 'no-store' });
            const data = await resp.json();
            if (!resp.ok || !data.ok) {
                alert(`Update failed.\n\n${data.stderr || ''}`);
                return;
            }
            alert(`Update applied.\n\nRestart required.\nRun:\n${data.restart_cmd}`);
        } catch (e) {
            alert('Update failed.');
        } finally {
            if (btn) btn.disabled = false;
            checkUpdateStatus();
        }
    }

    checkUpdateStatus();
    setInterval(checkUpdateStatus, 60_000);
    </script>
</body>
</html>
