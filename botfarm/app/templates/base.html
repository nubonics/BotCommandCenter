<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotFarmPlanner</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #06061a;
            --card: #0e1030;
            --card-2: #13163f;
            --border: rgba(255,255,255,0.10);
            --text: #f5f7ff;
            --muted: #aab2d5;
            --accent: #7c8cff;
            --accent-2: #9f6bff;
            --good: #58d68d;
            --bad: #ff6b81;
            --warn: #ffd166;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, Segoe UI, Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(124, 140, 255, 0.16), transparent 28%),
                radial-gradient(circle at top right, rgba(159, 107, 255, 0.12), transparent 22%),
                var(--bg);
            color: var(--text);
        }

        a { color: #c7d0ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .layout {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 16px 20px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            backdrop-filter: blur(10px);
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        .brand p {
            margin: 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav a {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            text-decoration: none;
        }

        .nav a:hover {
            background: rgba(255,255,255,0.06);
        }

        .message {
            margin-bottom: 18px;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(88, 214, 141, 0.25);
            background: rgba(88, 214, 141, 0.10);
            color: #d9ffe8;
        }

        .page-header {
            display: flex;
            gap: 16px;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .page-header h2 {
            margin: 0 0 6px 0;
            font-size: 1.8rem;
        }

        .page-header p {
            margin: 0;
            color: var(--muted);
        }

        .card {
            background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
        }

        .stat-card h3 {
            margin-top: 0;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .big-number {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .positive { color: var(--good); }
        .negative { color: var(--bad); }

        form { margin: 0; }

        .inline-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .form-row,
        .form-group {
            display: grid;
            gap: 8px;
            margin-bottom: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }

        .form-group-full,
        .form-group-lg {
            grid-column: span 2;
        }

        label {
            font-weight: 700;
            font-size: 0.95rem;
        }

        input,
        textarea,
        select,
        button {
            font: inherit;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: rgba(124, 140, 255, 0.65);
            box-shadow: 0 0 0 3px rgba(124, 140, 255, 0.16);
        }

        button {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            cursor: pointer;
            font-weight: 700;
        }

        button:hover { opacity: 0.95; }

        button.danger {
            background: linear-gradient(135deg, #d94f70, #ff6b81);
        }

        button.secondary,
        .secondary-link {
            background: rgba(255,255,255,0.03);
            color: var(--text);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .mono {
            font-family: Consolas, Monaco, monospace;
        }

        .secret-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .secret {
            display: none;
            padding: 6px 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .secret.revealed {
            display: inline-block;
        }

        .tiny-btn {
            padding: 8px 10px;
            font-size: 0.85rem;
            line-height: 1;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .muted { color: var(--muted); }

        dl {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 12px 14px;
            margin: 0;
        }

        dt {
            color: var(--muted);
            font-weight: 700;
        }

        dd {
            margin: 0;
            word-break: break-word;
        }

        @media (max-width: 900px) {
            .grid-2, .grid-3, .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group-full,
            .form-group-lg {
                grid-column: span 1;
            }

            dl {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="topbar">
            <div class="brand">
                <h1>BotFarmPlanner</h1>
                <p>Items, methods, and account tracking</p>
            </div>
            <nav class="nav">
                <a href="/">Dashboard</a>
                <a href="/planner_core/plans">Planner</a>
                <a href="/items">Items</a>
                <a href="/accounts">Accounts</a>
                <a href="/wall">Client Wall</a>
                <a href="/watchdog">Watchdog</a>
                <a href="/money-makers/new">New Money Maker</a>
                <a href="/accounts/new">New Account</a>
            </nav>
        </div>

        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script>
    function toggleSecret(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle("revealed");
    }
    </script>
</body>
</html>
